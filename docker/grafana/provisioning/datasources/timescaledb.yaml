apiVersion: 1

datasources:
  - name: TimescaleDB
    uid: timescaledb
    type: postgres
    access: proxy
    url: timescaledb:5432
    user: postgres
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: market_data
      sslmode: disable
      postgresVersion: 1700
      timescaledb: true
    isDefault: true
    editable: true